name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: python-semantic-release/python-semantic-release@v9
        id: release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Publishing runs in a separate workflow so a failed upload can be
      # retried against the tag without re-running semantic-release (which
      # would refuse, the tag already existing).
      - if: steps.release.outputs.released == 'true'
        run: gh workflow run publish.yml --ref main -f ref=${{ steps.release.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.release.outputs.released == 'true'
        run: gh workflow run docs.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
